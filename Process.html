<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
  body { background: #0c0b0a; }
  ::selection { background: #8aa9d6; color: #0c0b0a; }
  a { text-decoration: none; color: inherit; }
  img { display: block; }
  /* TEMP: highlight empty photo slots — remove later */
  image-slot:not([data-filled])::part(ring){ border:2px dashed #8aa9d6 !important; }
  image-slot:not([data-filled])::part(frame){ background:rgba(138,169,214,0.10) !important; }
  @media (max-width: 860px) {
    .p-intro { grid-template-columns: 1fr !important; }
    .p-step { grid-template-columns: 1fr !important; gap: 14px !important; }
    .p-study { grid-template-columns: 1fr !important; }
    .p-gallery { grid-template-columns: 1fr !important; }
    .p-gallery3 { grid-template-columns: 1fr 1fr !important; }
  }
  .social-rail a { color:#ffffff; transition:color 0.25s ease; }
  .social-rail a:hover { color:#b2aea6; }
  @media (max-width: 900px) { .social-rail { display:none !important; } }
</style>
<script defer src="image-slot.js"></script>
<script>
(function(){
  if (window.__socialWired) return; window.__socialWired = true;
  document.addEventListener('click', function(e){
    var a = e.target.closest ? e.target.closest('.social-rail a[data-social]') : null;
    if (!a) return;
    var url = a.getAttribute('data-social');
    if (url.indexOf('mailto:') === 0){ window.location.href = url; return; }
    var w = window.open(url, '_blank', 'noopener,noreferrer');
    if (!w) window.location.href = url;
  }, false);
})();
</script>
</helmet>

  <!-- ===== PHOTO GALLERY ===== -->
  <section style="padding:32px 4vw 7vw; max-width:1500px; margin:0 auto;">

    <!-- One unified grid so every gap is identical; tall images span two rows -->
    <div class="p-mosaic" style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
      <!-- Row band 1: tall left, two stacked right -->
      <div style="grid-column:1; grid-row:1 / span 2; overflow:hidden; background:#f4f1ea;"><image-slot id="proc-g1" src="assets/process-floorplan.png" shape="rect" fit="cover" placeholder="Add photo" style="width:100%; height:100%; display:block;"></image-slot></div>
      <div style="grid-column:2; grid-row:1; overflow:hidden; aspect-ratio:16/11; background:#1a1714;"><image-slot id="proc-g2" shape="rect" fit="cover" placeholder="Add photo" style="width:100%; height:100%; display:block;"></image-slot></div>
      <div style="grid-column:2; grid-row:2; overflow:hidden; aspect-ratio:16/11; background:#1a1714;"><image-slot id="proc-g3" shape="rect" fit="cover" placeholder="Add photo" style="width:100%; height:100%; display:block;"></image-slot></div>
      <!-- Row band 2: two stacked left, tall right -->
      <div style="grid-column:1; grid-row:3; overflow:hidden; aspect-ratio:16/11; background:#1a1714;"><image-slot id="proc-g5" shape="rect" fit="cover" placeholder="Add photo" style="width:100%; height:100%; display:block;"></image-slot></div>
      <div style="grid-column:1; grid-row:4; overflow:hidden; aspect-ratio:16/11; background:#1a1714;"><image-slot id="proc-g6" shape="rect" fit="cover" placeholder="Add photo" style="width:100%; height:100%; display:block;"></image-slot></div>
      <div style="grid-column:2; grid-row:3 / span 2; overflow:hidden; background:#1a1714;"><image-slot id="proc-g4" shape="rect" fit="cover" placeholder="Add photo" style="width:100%; height:100%; display:block;"></image-slot></div>
