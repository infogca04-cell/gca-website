  class DailyImage extends HTMLElement {
    connectedCallback(){
      if(this._done) return; this._done = true;
      var root = this.attachShadow({mode:'open'});
      var now = new Date();
      var day = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);
      var pick = IMAGES[day % IMAGES.length];
      var img = document.createElement('img');
      var self = this;
      if(pick.rot){
        img.style.cssText = 'position:absolute; top:50%; left:50%; object-fit:cover;';
        var layout = function(){
          var w = self.clientWidth, h = self.clientHeight;
          img.style.width = h + 'px';
          img.style.height = w + 'px';
          img.style.transform = 'translate(-50%,-50%) rotate(90deg)';
        };
        if(window.ResizeObserver){ new ResizeObserver(layout).observe(this); }
        layout();
        var host = document.createElement('div');
        host.style.cssText = 'position:relative; width:100%; height:100%; overflow:hidden;';
        host.appendChild(img);
        root.appendChild(host);
      } else {
        img.style.cssText = 'width:100%; height:100%; object-fit:cover; display:block;';
        root.appendChild(img);
      }
      img.src = pick.src;
    }
  }
  customElements.define('daily-image', DailyImage);
